<div class="container">
    
    <form class="form-group row">


        <div class="form-group col-md-3">
            <label for="nombre">Nombre:</label>
            <input type="text" name="nombre" id="nombre" placeholder="Nombre" class="form-control"
                [(ngModel)]="cuadroNombre">
        </div>


        <div class="form-group col-md-3">
            <label for="apellido">Apellidos:</label>
            <input type="text" name="apellidos" id="apellido" placeholder="Apellidos" class="form-control"
                [(ngModel)]="cuadroApellido">
        </div>

        <div class="form-group col-md-3">
            <label for="cargo">Cargo:</label>
            <input type="text" name="cargo" id="cargo" placeholder="Cargo" class="form-control"
                [(ngModel)]="cuadroCargo">
        </div>

        <div class="form-group col-md-3">
            <label for="salario">Salario:</label>
            <input type="text" name="salario" id="salario" placeholder="Salario" class="form-control"
                [(ngModel)]="cuadroSalario">
        </div>

        <div class="col">

            <button style="margin-top: 35px;" (click)="agregarEmpleado()" class="btn btn-primary" type="button">
                Agregar Empleado
            </button>

        </div>
    </form>
</div>

<br><br>

<button class="btn btn-primary" (click)="volverHome()"> Volver al inicio</button>
