<h1>{{ titulo }}</h1>
<form>

  Nombre <input type="text" [(ngModel)]="nombre" name="nombre"><br>
  Apellidos <input type="text" [(ngModel)]="apellidos" name="apellidos"><br>
  Cargo <input type="text" [(ngModel)]="cargo" name="cargo"><br>
  Salario <input type="number" [(ngModel)]="salario" name="salario"><br>

  <button (click)="agregarEmpleado()">Agregar</button>
</form>


<br>

<app-empleado></app-empleado>
<br><br>


<ul>@for (empleado of empleados; track $index) {

  <li style="list-style: none;"> {{ $index + 1 }} {{ nombre }} {{ empleado.apellidos }} {{empleado.cargo }} {{
    empleado.salario }}</li>

  }
</ul>
