<section>
    @if(isLoggedIn) {
    <p>Bienvenido, {{ username }}</p>
    <img 
    (click)="greet()"
    alt="Foto de perfil"
    src="https://github.com/maraloeDev.png" />

<h3>Los juegos favoritos de {{ username }}</h3>
    } @else {
    <p>Inicia Sesion</p>
    <button (click)="isLoggedIn=true">Inicia Sesión</button>
    }


    <app-games
      (addfavoriteEvent)="getFavorite($event)"
      username="username"></app-games>

      @if (favGame != '') {
        <p>Tu juego favorito es {{ favGame }}</p>
      }
</section>
