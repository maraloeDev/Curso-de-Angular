<div class="container">
  <div class="row">
    <div class="col">
      <div>
        {{indice + 1}} {{empleadoDeLista.nombre}} {{empleadoDeLista.apellido}} {{empleadoDeLista.cargo}}
        {{empleadoDeLista.salario}} <br>
      </div>
      <app-caracteristicas-empleado
        (CaracteristicasEmpleado)="agregarCaracteristica($event)"></app-caracteristicas-empleado>

      <ul style="list-style: none;">
        @for (caracteistica of arrayCaracteristicas; track $index) {

        <li>{{ caracteistica }}</li>
        }
      </ul>
    </div>
  </div>
</div>
